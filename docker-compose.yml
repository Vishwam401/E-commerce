version: '3.8'

services:
  # --- Database Container ---
  db:
    image: postgres:15
    container_name: ecommerce_db_cont
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vish
      - POSTGRES_DB=ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  # --- FastAPI App Container ---
  api:
    build: .
    container_name: ecommerce_api_cont
    ports:
      - "8001:8000"
    volumes:
      - .:/app  # Hot-reload ke liye local code ko container se link kiya
    env_file:
      - .env.docker
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:


