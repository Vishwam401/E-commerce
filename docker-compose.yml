
services:
  # --- Database Container ---
  db:
    image: postgres:15
    container_name: ecommerce_db_cont
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vish
      - POSTGRES_DB=ecommerce_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  # --- FastAPI App Container ---
  api:
    build: .
    container_name: ecommerce_api_cont
    ports:
      - "8001:8000"
    volumes:
      - .:/app  # Hot-reload ke liye local code ko container se link kiya
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:alpine
    container_name: ecommerce_redis
    env_file:
      - .env.docker
    command: sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}"'
    expose:
      - "6379"
    restart: always

  # --- Celery Worker Container (Email tasks execute karega!) ---
  celery_worker:
    build: .
    container_name: ecommerce_celery_worker
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info
    restart: always

volumes:
  postgres_data:
